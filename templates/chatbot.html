<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfusion Monitoring System - Chatbot Interface</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            color: white;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        .main-container {
            display: flex;
            flex: 1;
            gap: 1rem;
            padding: 1rem;
            max-height: calc(100vh - 120px);
        }

        .chat-container {
            flex: 2;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 1rem;
            text-align: center;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            background: #f8f9fa;
            max-height: 70vh;
        }

        .message {
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            max-width: 85%;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.system {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-start;
        }

        .message.parameter {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            align-self: flex-start;
        }

        .message.action {
            background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%);
            color: #2d3436;
            align-self: flex-start;
        }

        .message.warning {
            background: linear-gradient(135deg, #fd79a8 0%, #fdcb6e 100%);
            color: #2d3436;
            align-self: flex-start;
            border-left: 4px solid #e17055;
        }

        .message.error {
            background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%);
            color: white;
            align-self: flex-start;
            border-left: 4px solid #d63031;
        }

        .message.success {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
            align-self: flex-start;
            border-left: 4px solid #00b894;
        }

        .message.info {
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            color: white;
            align-self: flex-start;
        }

        .timestamp {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 0.25rem;
        }

        .control-panel {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            height: fit-content;
        }

        .control-panel h3 {
            color: #2d3436;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .control-group {
            margin-bottom: 1.5rem;
        }

        .control-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #636e72;
        }

        select, button {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        button {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .stop-button {
            background: linear-gradient(135deg, #e17055 0%, #d63031 100%);
            margin-top: 0.5rem;
        }

        .stop-button:hover {
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.4);
        }

        .status-indicator {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 1rem;
        }

        .status-idle {
            background: #ddd;
            color: #636e72;
        }

        .status-running {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #e9ecef;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #636e72;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .loading-spinner {
            display: none;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e9ecef;
            border-left: 4px solid #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar styling */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                gap: 0.5rem;
                padding: 0.5rem;
            }
            
            .control-panel {
                order: -1;
            }
            
            .chat-messages {
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏥 Perfusion Monitoring System</h1>
        <p>Real-time AI-powered perfusion process monitoring with hour-by-hour updates</p>
    </div>

    <div class="main-container">
        <div class="chat-container">
            <div class="chat-header">
                <h3>💬 Live Monitoring Feed</h3>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="loading-spinner" id="loadingSpinner">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <h3>⚙️ Control Panel</h3>
            
            <div class="status-indicator" id="statusIndicator">
                <span id="statusText">System Ready</span>
            </div>

            <div class="control-group">
                <label for="scenarioSelect">Simulation Scenario:</label>
                <select id="scenarioSelect">
                    <option value="EYE">Eye Perfusion</option>
                    <option value="VCA">VCA Perfusion</option>
                </select>
            </div>

            <div class="control-group">
                <button id="startButton" onclick="startSimulation()">
                    🚀 Start Simulation
                </button>
                <button id="stopButton" class="stop-button" onclick="stopSimulation()" disabled>
                    ⏹️ Stop Simulation
                </button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="currentHour">0</div>
                    <div class="stat-label">Current Hour</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalReward">0</div>
                    <div class="stat-label">Total Reward</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="messageCount">0</div>
                    <div class="stat-label">Messages</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="systemStatus">Ready</div>
                    <div class="stat-label">Status</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // WebSocket connection
        const socket = io();
        
        // Global variables
        let isSimulationRunning = false;
        let messageCount = 0;
        let currentHour = 0;
        let totalReward = 0;

        // DOM elements
        const chatMessages = document.getElementById('chatMessages');
        const startButton = document.getElementById('startButton');
        const stopButton = document.getElementById('stopButton');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const scenarioSelect = document.getElementById('scenarioSelect');
        const loadingSpinner = document.getElementById('loadingSpinner');

        // Stats elements
        const currentHourStat = document.getElementById('currentHour');
        const totalRewardStat = document.getElementById('totalReward');
        const messageCountStat = document.getElementById('messageCount');
        const systemStatusStat = document.getElementById('systemStatus');

        // Socket event handlers
        socket.on('connect', function() {
            console.log('Connected to server');
            updateStatus('Connected', 'idle');
        });

        socket.on('disconnect', function() {
            console.log('Disconnected from server');
            updateStatus('Disconnected', 'idle');
            isSimulationRunning = false;
            updateUI();
        });

        socket.on('chat_message', function(data) {
            addMessage(data);
            
            // Update statistics based on message content
            if (data.type === 'system' && data.message.includes('Hour')) {
                const hourMatch = data.message.match(/Hour (\d+)/);
                if (hourMatch) {
                    currentHour = parseInt(hourMatch[1]);
                    currentHourStat.textContent = currentHour;
                }
            }
            
            if (data.type === 'info' && data.message.includes('Total:')) {
                const rewardMatch = data.message.match(/Total: ([\d.-]+)/);
                if (rewardMatch) {
                    totalReward = parseFloat(rewardMatch[1]);
                    totalRewardStat.textContent = Math.round(totalReward);
                }
            }
        });

        socket.on('simulation_complete', function(data) {
            console.log('Simulation completed');
            isSimulationRunning = false;
            updateStatus('Simulation Complete', 'idle');
            updateUI();
            systemStatusStat.textContent = 'Complete';
        });

        function addMessage(data) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${data.type || 'system'}`;
            
            // Format message content with markdown-like bold
            let messageContent = data.message || '';
            messageContent = messageContent.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            messageContent = messageContent.replace(/\n/g, '<br>');
            
            messageDiv.innerHTML = `
                ${messageContent}
                <div class="timestamp">${data.timestamp}</div>
            `;
            
            chatMessages.appendChild(messageDiv);
            
            // Auto-scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            // Update message count
            messageCount++;
            messageCountStat.textContent = messageCount;
            
            // Hide loading spinner if visible
            loadingSpinner.style.display = 'none';
        }

        function startSimulation() {
            if (isSimulationRunning) return;
            
            const scenario = scenarioSelect.value;
            
            // Show loading state
            loadingSpinner.style.display = 'flex';
            updateStatus('Starting Simulation...', 'running');
            isSimulationRunning = true;
            updateUI();
            
            // Reset statistics
            currentHour = 0;
            totalReward = 0;
            messageCount = 0;
            currentHourStat.textContent = '0';
            totalRewardStat.textContent = '0';
            messageCountStat.textContent = '0';
            systemStatusStat.textContent = 'Running';
            
            // Clear previous messages
            chatMessages.innerHTML = '<div class="loading-spinner" id="loadingSpinner"><div class="spinner"></div></div>';
            
            // Send start request
            fetch('/api/start_simulation', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    scenario: scenario
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    console.error('Error starting simulation:', data.error);
                    addMessage({
                        type: 'error',
                        message: `❌ Error: ${data.error}`,
                        timestamp: new Date().toLocaleTimeString()
                    });
                    isSimulationRunning = false;
                    updateStatus('Error', 'idle');
                    updateUI();
                }
            })
            .catch(error => {
                console.error('Network error:', error);
                addMessage({
                    type: 'error',
                    message: `❌ Network error: ${error.message}`,
                    timestamp: new Date().toLocaleTimeString()
                });
                isSimulationRunning = false;
                updateStatus('Error', 'idle');
                updateUI();
            });
        }

        function stopSimulation() {
            if (!isSimulationRunning) return;
            
            fetch('/api/stop_simulation', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                console.log('Simulation stopped');
                isSimulationRunning = false;
                updateStatus('Stopped', 'idle');
                updateUI();
                systemStatusStat.textContent = 'Stopped';
                addMessage({
                    type: 'warning',
                    message: '⏹️ Simulation stopped by user',
                    timestamp: new Date().toLocaleTimeString()
                });
            })
            .catch(error => {
                console.error('Error stopping simulation:', error);
            });
        }

        function updateStatus(text, status) {
            statusText.textContent = text;
            statusIndicator.className = `status-indicator status-${status}`;
        }

        function updateUI() {
            startButton.disabled = isSimulationRunning;
            stopButton.disabled = !isSimulationRunning;
            scenarioSelect.disabled = isSimulationRunning;
        }

        // Initial UI update
        updateUI();
        
        // Check server status periodically
        setInterval(() => {
            if (!isSimulationRunning) {
                fetch('/api/status')
                    .then(response => response.json())
                    .then(data => {
                        if (data.running && !isSimulationRunning) {
                            // Server says it's running but client doesn't think so
                            isSimulationRunning = true;
                            updateStatus('Simulation Running', 'running');
                            updateUI();
                        }
                    })
                    .catch(error => {
                        // Server might be down
                        console.log('Status check failed:', error);
                    });
            }
        }, 5000);
    </script>
</body>
</html>
